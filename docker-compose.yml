services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "8001:8001"
    depends_on:
      - falkordb
      - redis
    volumes:
      - .:/app
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8001 --reload

  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
      - "3000:3000"
    volumes:
      - falkordb-data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data

volumes:
  falkordb-data:
  redis-data:
